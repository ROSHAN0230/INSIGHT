<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #0a0a0c; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
    </style>
</head>
<body class="overflow-x-hidden">
    <main class="pt-40 pb-20 px-6">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="glass-card p-8"><h3 class="text-xl font-bold mb-3">NEURAL CHAT</h3><p class="text-white/40">Advanced RAG.</p></div>
            <div class="glass-card p-8"><h3 class="text-xl font-bold mb-3">DATA EXPLORER</h3><p class="text-white/40">Vector Telemetry.</p></div>
            <div class="glass-card p-8"><h3 class="text-xl font-bold mb-3">LOGIC ENGINE</h3><p class="text-white/40">Python Code.</p></div>
            <div class="glass-card p-8"><h3 class="text-xl font-bold mb-3">ANALYTICS HUB</h3><p class="text-white/40">Metrics Console.</p></div>
        </div>
    </main>
</body>
</html>
